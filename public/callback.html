<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Logging in...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;}
.spinner{width:32px;height:32px;border:2px solid #1a1a1a;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
p{font-size:12px;color:#555;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.err{color:#ff4444;font-size:13px;text-transform:none;letter-spacing:0;max-width:340px;text-align:center;line-height:1.5;}
a{color:#fff;text-decoration:underline;font-size:12px;}
</style>
</head>
<body>
<div class="spinner" id="spin"></div>
<p id="msg">Logging in with Discord...</p>
<script>
(async function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var error = params.get('error');
  var msg = document.getElementById('msg');
  var spin = document.getElementById('spin');

  if (error || !code) {
    spin.style.display = 'none';
    msg.className = 'err';
    msg.textContent = 'Login cancelled or failed. ';
    var a = document.createElement('a');
    a.href = '/';
    a.textContent = 'Go back';
    msg.appendChild(a);
    return;
  }

  try {
    var res = await fetch('/.netlify/functions/discord-auth?code=' + encodeURIComponent(code));
    var data = await res.json();

    if (res.status === 403 && data.error === 'not_in_guild') {
      spin.style.display = 'none';
      msg.className = 'err';
      msg.innerHTML = 'You need to join the BGSI Market server first.<br><br>'
        + '<a href="https://discord.gg/XsREudySSx" target="_blank">Join Server</a>'
        + ' &nbsp;&bull;&nbsp; <a href="/">Go back</a>';
      return;
    }

    if (!res.ok || data.error) {
      throw new Error(data.error || 'Auth failed');
    }

    // Store user in localStorage for the main app
    localStorage.setItem('bgsi_user', JSON.stringify(data));
    msg.textContent = 'Logged in! Redirecting...';
    setTimeout(function() { window.location.href = '/'; }, 600);
  } catch(e) {
    spin.style.display = 'none';
    msg.className = 'err';
    msg.textContent = 'Login failed: ' + e.message + '. ';
    var a = document.createElement('a');
    a.href = '/';
    a.textContent = 'Go back';
    msg.appendChild(a);
  }
})();
</script>
</body>
</html>
